name: Stock Decision V6 Cloud

on:
  workflow_dispatch:
  schedule:
    # 北京时间工作日 08:45、13:55、14:20、14:40、14:50、14:58
    - cron: '45 0 * * 1-5'
    - cron: '55 5 * * 1-5'
    - cron: '20,40,50,58 6 * * 1-5'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: stock-decision-v6
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run V6 pipeline
        env:
          TZ: Asia/Shanghai
          PYTHONUTF8: '1'
        run: python cloud_runner.py
      - name: Upload diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v6-diagnostics-${{ github.run_number }}
          path: |
            logs/
            output/health.json
          if-no-files-found: ignore
          retention-days: 7
      - name: Persist state safely
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git pull --rebase || true
          git add data/dynamic_pool.csv data/risk_pool.csv data/recommendation_history.csv data/cache/ data/global_risk_auto.csv data/event_risk_auto.csv 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m 'chore: update V6 state [skip ci]'
            git push || echo '[WARN] state push skipped because repository changed concurrently'
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
