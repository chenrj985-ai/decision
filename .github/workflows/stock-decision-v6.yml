name: Stock Decision V6 Formal

on:
  workflow_dispatch:
  schedule:
    # 北京时间工作日 08:45、13:55、14:20、14:40、14:50、14:58（UTC换算）
    - cron: '45 0 * * 1-5'
    - cron: '55 5 * * 1-5'
    - cron: '20,40,50,58 6 * * 1-5'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: stock-decision-v6
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke test
        run: python tests/smoke_test.py

      - name: Generate decision report
        run: python cloud_runner.py

      - name: Verify outputs
        run: |
          test -s site/index.html
          test -s site/latest.json
          test -s output/latest.json
          echo "output verified"

      - name: Commit generated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f site output logs reports cache data/generated || true
          git diff --cached --quiet || git commit -m "Auto update V6 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || echo "No state push or concurrent update; Pages deployment continues."

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v6-diagnostics-${{ github.run_number }}
          path: |
            logs
            reports
            output/latest.json
          retention-days: 14
