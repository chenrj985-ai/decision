name: Stock Decision Auto

on:
  workflow_dispatch:
  schedule:
    # 北京时间工作日14:00、14:20
    - cron: "0,20 6 * * 1-5"
    # 北京时间工作日14:40后每5分钟，到15:00
    - cron: "40,45,50,55 6 * * 1-5"
    - cron: "0 7 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: stock-decision-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Shanghai
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run decision engine and publish files
        id: generate
        continue-on-error: true
        run: python github_publish.py

      - name: Write failure status
        if: steps.generate.outcome != 'success'
        run: python github_failure_status.py

      - name: Keep history under control
        shell: bash
        run: |
          mkdir -p history
          find history -type f -name "*.html" -mtime +45 -delete || true

      - name: Commit generated files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            history mobile_latest.html latest_url.txt latest_manifest.json status.json \
            latest_decision.txt buy_candidates.csv position_decisions.csv \
            etf_rotation.csv all_scores.csv market_snapshot.csv index_snapshot.csv \
            source_health.json data/dynamic_pool.csv data/risk_pool.csv \
            data/recommendation_history.csv output/history || true
          if git diff --cached --quiet; then
            echo "No generated changes."
          else
            git commit -m "auto: update stock report $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Mark workflow failed when generation failed
        if: steps.generate.outcome != 'success'
        run: |
          echo "The previous successful page was preserved, but this generation failed."
          exit 1
