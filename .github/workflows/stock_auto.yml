name: V7 Pro Stock Auto Run

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC.
    # Beijing 11:00 = UTC 03:00
    - cron: "0 3 * * 1-5"
    # Beijing 14:00, 14:20, 14:40, 14:50
    - cron: "0,20,40,50 6 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: v7-pro-stock-report
  cancel-in-progress: false

jobs:
  run-stock-system:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Create required folders
        run: |
          mkdir -p output/history logs history public/history
          touch output/.gitkeep output/history/.gitkeep logs/.gitkeep history/.gitkeep public/.gitkeep

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run V7 Pro
        id: engine
        continue-on-error: true
        env:
          TZ: Asia/Shanghai
          PYTHONUTF8: "1"
          PYTHONUNBUFFERED: "1"
        run: python github_run.py

      - name: Verify folders and outputs
        if: always()
        run: python verify_outputs.py

      - name: Commit generated data and reports
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Auto update stock report"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Configure GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Mark failed when stock engine failed
        if: steps.engine.outcome == 'failure'
        run: |
          echo "核心程序失败，旧报告已保留，详情见 status.json 和 output/github_last_error.txt"
          exit 1
