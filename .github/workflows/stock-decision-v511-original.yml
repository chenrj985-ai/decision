name: Stock Decision V5.1.1 Original Core

on:
  workflow_dispatch:
  schedule:
    # Beijing weekdays: 08:45, 13:55, 14:20, 14:40, 14:50, 14:58
    - cron: '45 0 * * 1-5'
    - cron: '55 5 * * 1-5'
    - cron: '20,40,50,58 6 * * 1-5'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: stock-decision-v511-original
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run original V5.1.1 engine
        run: python cloud_runner.py

      - name: Validate generated report
        run: |
          test -s site/index.html
          test -s site/latest.json
          test -s output/mobile_latest.html

      - name: Commit generated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data output logs site
          git diff --cached --quiet || git commit -m "Auto update V5.1.1 report"
          git pull --rebase origin main
          git push origin main

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
